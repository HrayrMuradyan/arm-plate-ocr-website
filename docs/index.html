<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>License Plate Scanner</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <h1>Plate Scanner</h1>
        <p class="subtitle">Take or upload a photo to extract the license plate</p>
        
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" capture="environment">
            <label for="imageInput" class="upload-btn">
                <span class="icon">📷</span> Capture / Upload Photo
            </label>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            Analyzing Plate...
        </div>

        <div class="preview-section" id="previewSection" style="display: none;">
            <img id="imagePreview" src="" alt="Selected Plate">
        </div>

        <div class="result-section" id="resultSection" style="display: none;">
            <h2>Detected Plate</h2>
            <div id="plateResult" class="plate-box">-- -- ---</div>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
